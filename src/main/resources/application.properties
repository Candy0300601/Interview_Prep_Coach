spring.application.name=InterviewCoachAIApplication
server.port=8080


spring.datasource.url=jdbc:postgresql://localhost:5432/interviewcoach
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=session-question-generator

spring.kafka.consumer.auto-offset-reset=earliest

spring.ai.ollama.base-url=http://localhost:11434

spring.ai.ollama.chat.options.model=qwen3.5:0.8b
spring.ai.ollama.chat.options.temperature=0.3
